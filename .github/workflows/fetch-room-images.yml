name: Fetch site images into repo storage

# Downloads every image listed in assets/manifest.txt into the repo so the
# website never depends on Google Drive or third-party CDNs at runtime.
# Manifest line format:  <relative-path-under-assets/>  <drive-file-id | https-url>
# Existing files are skipped, so re-runs only fetch new entries.

on:
  workflow_dispatch:
  push:
    branches: [claude/geo-optimize-rooms-content-25lnjt, main]
    paths:
      - '.github/workflows/fetch-room-images.yml'
      - 'assets/manifest.txt'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download images
        run: |
          set -uo pipefail
          cd assets
          fail=0
          while read -r name src; do
            [ -z "${name:-}" ] && continue
            case "$name" in \#*) continue;; esac
            if [ -s "$name" ]; then echo "exists: $name"; continue; fi
            mkdir -p "$(dirname "$name")"
            if [ "${src#https://}" != "$src" ]; then
              urls="$src"
            else
              urls="https://lh3.googleusercontent.com/d/${src}=w1600 https://drive.usercontent.google.com/download?id=${src}&export=download"
            fi
            ok=0
            for url in $urls; do
              if curl -fsSL --retry 3 --retry-delay 2 -H 'Accept: image/jpeg,image/*' "$url" -o "$name"; then
                if file "$name" | grep -qiE 'JPEG|PNG|WebP'; then ok=1; break; fi
              fi
              rm -f "$name"
            done
            if [ "$ok" = 1 ]; then
              echo "fetched: $name ($(du -h "$name" | cut -f1))"
            else
              echo "::error::FAILED to download $name from $src"
              fail=1
            fi
          done < manifest.txt
          exit $fail

      - name: Fetch waterfall photos from Wikimedia Commons
        run: |
          python3 - <<'EOF'
          import json, os, urllib.parse, urllib.request

          TARGETS = {
              "site/waterfall-kempty.jpg": "Kempty Falls Mussoorie",
              "site/waterfall-bhatta.jpg": "Bhatta Falls Mussoorie",
              "site/waterfall-jharipani.jpg": "Jharipani Falls",
              "site/waterfall-mossy.jpg": "Mossy Fall Mussoorie",
          }
          CREDITS = "assets/site/waterfall-credits.json"
          credits = json.load(open(CREDITS)) if os.path.exists(CREDITS) else {}
          UA = {"User-Agent": "ShivaContinentalSite/1.0 (image fetch for attribution-compliant reuse)"}

          opener = urllib.request.build_opener()
          opener.addheaders = list(UA.items())

          def api(params):
              url = "https://commons.wikimedia.org/w/api.php?" + urllib.parse.urlencode(params)
              return json.load(opener.open(url, timeout=30))

          for out, term in TARGETS.items():
              path = os.path.join("assets", out)
              if os.path.getsize(path) > 0 if os.path.exists(path) else False:
                  print("exists:", out); continue
              data = api({"action": "query", "generator": "search",
                          "gsrsearch": term + " filetype:bitmap", "gsrnamespace": 6, "gsrlimit": 10,
                          "prop": "imageinfo", "iiprop": "url|size|extmetadata", "iiurlwidth": 1600,
                          "format": "json"})
              pages = (data.get("query") or {}).get("pages") or {}
              best = None
              for p in sorted(pages.values(), key=lambda p: p.get("index", 99)):
                  ii = (p.get("imageinfo") or [{}])[0]
                  if not ii.get("thumburl"): continue
                  if ii.get("width", 0) < 1000: continue
                  mime_ok = ii.get("thumburl", "").lower().endswith((".jpg", ".jpeg", ".png"))
                  if not mime_ok: continue
                  best = (p, ii); break
              if not best:
                  print("::warning::no Commons image found for", term); continue
              p, ii = best
              with opener.open(ii["thumburl"], timeout=60) as resp, open(path, "wb") as fh:
                  fh.write(resp.read())
              # verify it downloaded as an image
              with open(path, "rb") as fh: magic = fh.read(4)
              if magic[:3] != b"\xff\xd8\xff" and magic[:4] != b"\x89PNG":
                  os.remove(path); print("::warning::bad download for", term); continue
              em = ii.get("extmetadata") or {}
              def meta(k): return (em.get(k) or {}).get("value", "")
              credits[out] = {
                  "title": p.get("title", ""),
                  "artist": meta("Artist"),
                  "license": meta("LicenseShortName"),
                  "descriptionurl": ii.get("descriptionurl", ""),
              }
              print("fetched:", out, "<-", p.get("title"), "| license:", credits[out]["license"])
          json.dump(credits, open(CREDITS, "w"), indent=1)
          EOF

      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          if git diff --cached --quiet; then
            echo "No new images to commit."
          else
            git commit -m "Add site images (migrated to repo storage)"
            git push
          fi
